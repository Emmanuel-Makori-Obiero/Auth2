<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Register</title>
  </head>
  <body>
    <div class="flex text-white-700 text-md bg-blue-700 justify-end">
      <ul class="flex text-white gap-3">
        <li><a href="index.html">Home</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
      </ul>
    </div>
    <div class="flex flex-col items-center justify-center h-screen gap-5">
      <h1 class="text-2xl font-bold">Create an Account</h1>
      <form
        class="flex flex-col gap-5 w-full max-w-sm"
        action="dashboard.html"
        method="post"
      >
        <input
          type="text"
          placeholder="Username"
          class="px-4 py-2 border border-blue-700 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
        <input
          type="email"
          placeholder="Email Address"
          class="px-4 py-2 border border-blue-700 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
        <input
          type="password"
          placeholder="Password"
          class="px-4 py-2 border border-blue-700 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
        <input
          type="password"
          placeholder="Confirm Password"
          class="px-4 py-2 border border-blue-700 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
        <button
          type="submit"
          class="px-6 py-3 bg-blue-700 text-white rounded-md hover:bg-blue-800 transition duration-300"
        >
          Register
        </button>
      </form>
    </div>
  </body>
</html>
